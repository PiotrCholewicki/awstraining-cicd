name: Multibranch pipeline
run-name: Multibranch ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches:
      - main
      - release/*
      - feature/*
      - bugfix/*
  workflow_dispatch:
    inputs:
      skipSmokeTests:
        description: Should skip smoke tests?
        type: boolean
        required: false
        default: false

jobs:
  properties:
    uses: ./.github/workflows/datacenterMap.yml
    with:
      hubEnv: BACKEND_EMEA_TEST
    secrets: inherit

  buildTestDeploy:
    runs-on: ubuntu-latest
    needs: properties
    env:
      AWS_ACCOUNT: ${{ needs.properties.outputs.AWS_ACCOUNT }}
      REGION: ${{ needs.properties.outputs.REGION }}
      CLUSTER_NAME: ${{ needs.properties.outputs.CLUSTER_NAME }}
      SERVICE_NAME: ${{ needs.properties.outputs.SERVICE_NAME }}
      AWS_KEY:  ${{ secrets.BACKEND_EMEA_TEST_AWS_KEY }}
      AWS_SECRET: ${{ secrets.BACKEND_EMEA_TEST_AWS_SECRET }}
      # domyślnie false dla push; dla ręcznego wywołania bierzemy inputs
      SKIP_SMOKE_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skipSmokeTests || 'false' }}
      SMOKETEST_BACKEND_PASSWORD: ${{ secrets.BACKEND_EMEA_TEST_SMOKETEST_BACKEND_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: JDK 17 setup
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Pełny build + testy jednostkowe (jeśli są)
      - name: Maven build (unit)
        run: mvn -B clean package -DskipTests=false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_KEY }}
          aws-secret-access-key: ${{ env.AWS_SECRET }}
          aws-region: ${{ env.REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names backend >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name backend --image-tag-mutability MUTABLE

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend
          IMAGE_TAG: ${{ github.ref_name }} # nazwa brancha jako tag
        run: |
          docker build -t backend .
          docker tag backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:${IMAGE_TAG}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${IMAGE_TAG}

      # Jeśli task.json ma placeholder obrazu, możesz użyć renderowania i podmiany.
      # Jeśli task.json ma już obraz na '.../backend:latest', to wystarczy sam force-new-deployment.
      - name: Deploy Amazon ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --service "${{ env.SERVICE_NAME }}" \
            --force-new-deployment \
            --region "${{ env.REGION }}"
          # czekamy na stabilność
          aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --services "${{ env.SERVICE_NAME }}"

      # SMOKE TESTY – uruchamiane jako testy Maven JUnit z właściwymi parametrami
      - name: Run smoke tests (JUnit)
        if: ${{ env.SKIP_SMOKE_TESTS == 'false' }}
        run: |
          # Jeśli hasło nie jest w pliku properties, przekaż je tu:
          # -Dsmoketest.backend.password="${{ env.SMOKETEST_BACKEND_PASSWORD }}"
          mvn -B verify -Dhub=EMEA -Denvironment=TEST \
            -Dsmoketest.backend.password="${{ env.SMOKETEST_BACKEND_PASSWORD }}"

  pipelinePassed:
    runs-on: ubuntu-latest
    needs: buildTestDeploy
    steps:
      - name: All passed
        run: echo "All steps have passed."