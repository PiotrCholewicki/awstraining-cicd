name: Multibranch pipeline
run-name: Multibranch ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches:
      - main
      - release/*
      - feature/*
      - bugfix/*
  workflow_dispatch:
    inputs:
      skipSmokeTests:
        description: Should skip smoke tests?
        type: boolean
        required: false
        default: false

jobs:
  properties:
    uses: ./.github/workflows/datacenterMap.yml
    with:
      hubEnv: BACKEND_EMEA_TEST
    secrets: inherit

  buildTestDeploy:
    runs-on: ubuntu-latest
    needs: properties
    env:
      AWS_ACCOUNT: ${{ needs.properties.outputs.AWS_ACCOUNT }}
      AWS_PROFILE: ${{ needs.properties.outputs.PROFILE }}
      AWS_KEY: ${{ secrets[format('{0}_AWS_KEY', 'BACKEND_EMEA_TEST')] }}
      AWS_SECRET: ${{ secrets[format('{0}_AWS_SECRET', 'BACKEND_EMEA_TEST')] }}
      AWS_REGION: ${{ needs.properties.outputs.REGION }}

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Maven build + tests + JaCoCo
      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      # Configure AWS credentials
      - name: Configure AWS profile
        run: |
          mkdir -p ~/.aws
          echo "[${{ env.AWS_PROFILE }}]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ env.AWS_KEY }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ env.AWS_SECRET }}" >> ~/.aws/credentials

      # Login ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t backend .

      # Tag image
      - name: Tag image
        run: |
          docker tag backend:latest $AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest

      # Push image
      - name: Push image to ECR
        run: |
          docker push $AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest

      # Deploy task definition
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster backend-ecs-test \
            --service backend \
            --force-new-deployment \
            --region $AWS_REGION

      # Smoke tests
      - name: Run Smoke Tests
        if: ${{ inputs.skipSmokeTests != true }}
        run: |
          ./smoketests/run.sh

  pipelinePassed:
    runs-on: ubuntu-latest
    needs: buildTestDeploy
    steps:
      - name: All passed
        run: echo "All steps have passed."