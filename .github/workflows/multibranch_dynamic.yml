name: Multibranch pipeline

on:
  workflow_dispatch:
    inputs:
      env:
        description: Select test environment
        required: true
        type: choice
        options:
          - BACKEND_EMEA_TEST
          - BACKEND_US_TEST

jobs:

  properties:
    uses: ./.github/workflows/datacenterMap.yml
    with:
      hubEnv: ${{ inputs.env }}
    secrets: inherit

  deploy:
    runs-on: ubuntu-latest
    needs: properties
    env:
      AWS_KEY:  ${{ secrets[format('{0}_AWS_KEY', inputs.env)] }}
      AWS_SECRET: ${{ secrets[format('{0}_AWS_SECRET', inputs.env)] }}
      REGION: ${{ needs.properties.outputs.REGION }}
      CLUSTER_NAME: ${{ needs.properties.outputs.CLUSTER_NAME }}
      SERVICE_NAME: ${{ needs.properties.outputs.SERVICE_NAME }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_KEY }}
          aws-secret-access-key: ${{ env.AWS_SECRET }}
          aws-region: ${{ env.REGION }}

      - name: Render ECS network config
        uses: ./.github/workflows/render-network.yml
        with:
          hubEnv: ${{ inputs.env }}

      - name: Download rendered service.json
        uses: actions/download-artifact@v4
        with:
          name: service-rendered-${{ inputs.env }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        id: login-ecr

      - name: Build & Push image
        env:
          ECR: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t backend .
          docker tag backend:latest $ECR/backend:latest
          docker push $ECR/backend:latest

      - name: Deploy TaskDefinition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: assembly-fargate/src/main/resources/fargate/${{ inputs.env }}/task.json
          service: ${{ env.SERVICE_NAME }}
          cluster: ${{ env.CLUSTER_NAME }}
          wait-for-service-stability: false

      - name: Update Service network configuration
        run: |
          SUBNETS=$(jq -r '.networkConfiguration.awsvpcConfiguration.subnets | join(",")' service.rendered.json)
          SGS=$(jq -r '.networkConfiguration.awsvpcConfiguration.securityGroups | join(",")' service.rendered.json)
          ASSIGN=$(jq -r '.networkConfiguration.awsvpcConfiguration.assignPublicIp' service.rendered.json)

          aws ecs update-service \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --service "${{ env.SERVICE_NAME }}" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SGS],assignPublicIp=$ASSIGN}"

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --services "${{ env.SERVICE_NAME }}"