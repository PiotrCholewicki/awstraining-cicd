name: Render ECS network config

on:
  workflow_call:
    inputs:
      hubEnv:
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Terraform outputs
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs-${{ inputs.hubEnv }}

      - name: Render service.json
        id: render
        shell: bash
        run: |
          OUT=tf_outputs_${{ inputs.hubEnv }}.json
          TEMPLATE="assembly-fargate/src/main/resources/fargate/${{ inputs.hubEnv }}/service.json"
          OUTPUT="service.rendered.json"

          SUBNETS=$(jq -c '.private_subnets_id.value' "$OUT")
          SG=$(jq -r '.sg_backend_id.value')

          SG_JSON=$(jq -nc --arg sg "$SG" '[ $sg ]')

          jq --argjson subnets "$SUBNETS" \
             --argjson sgs "$SG_JSON" \
             '.networkConfiguration.awsvpcConfiguration.subnets = $subnets
              | .networkConfiguration.awsvpcConfiguration.securityGroups = $sgs' \
              "$TEMPLATE" > "$OUTPUT"

          echo "output=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload rendered service.json
        uses: actions/upload-artifact@v4
        with:
          name: service-rendered-${{ inputs.hubEnv }}
          path: service.rendered.json